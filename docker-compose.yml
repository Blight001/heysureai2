services:
  # This docker-compose lives in the HeySure *workspace* root.
  # web/, server/, device/ are Git submodules (HeySure-Web/Server/Device).
  # Clone with --recurse-submodules or run: git submodule update --init --recursive
  # Each build context points to one of the three component repositories.
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=heysure
      - POSTGRES_PASSWORD=heysure
      - POSTGRES_DB=heysure
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heysure"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # One-shot schema migration, decoupled from the app processes (see
  # doc/db-migrations.md §Step 4). Runs `alembic upgrade head` once, then exits;
  # the four runtimes wait for it to finish and start with auto-migrate off.
  db-migrate:
    build: ./server
    environment:
      - DATABASE_URL=postgresql+psycopg://heysure:heysure@db:5432/heysure
    command: ["python", "-m", "api.db", "migrate"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api-gateway:
    build: ./server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    volumes:
      - ./server/data:/app/data
    environment:
      - HEYSURE_SERVICE_ROLE=gateway
      - DATABASE_URL=postgresql+psycopg://heysure:heysure@db:5432/heysure
      - HEYSURE_INTERNAL_TOKEN=${HEYSURE_INTERNAL_TOKEN:-heysure-dev-internal-token-change-me}
      - MCP_RUNTIME_URL=http://mcp-runtime:3001
      - CONNECTOR_RUNTIME_URL=http://connector-runtime:3002
      - AI_RUNTIME_URL=http://ai-runtime:3003
      - AI_DISPATCH_MODE=remote
      - HEYSURE_DB_AUTO_MIGRATE=0
    command: ["uvicorn", "gateway.app:sio_app", "--host", "0.0.0.0", "--port", "3000"]
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  ai-runtime:
    build: ./server
    # Internal-only status server (/internal/health + /internal/logs) on 3003,
    # reachable by api-gateway over the compose network for the admin panel.
    expose:
      - "3003"
    volumes:
      - ./server/data:/app/data
    environment:
      - HEYSURE_SERVICE_ROLE=worker
      - DATABASE_URL=postgresql+psycopg://heysure:heysure@db:5432/heysure
      - HEYSURE_INTERNAL_TOKEN=${HEYSURE_INTERNAL_TOKEN:-heysure-dev-internal-token-change-me}
      - HEYSURE_API_GATEWAY_URL=http://api-gateway:3000
      - MCP_RUNTIME_URL=http://mcp-runtime:3001
      - CONNECTOR_RUNTIME_URL=http://connector-runtime:3002
      - HEYSURE_AI_RUNTIME_PORT=3003
      - HEYSURE_DB_AUTO_MIGRATE=0
    command: ["python", "-m", "ai_runtime.main"]
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      api-gateway:
        condition: service_started
      mcp-runtime:
        condition: service_started
    restart: unless-stopped

  mcp-runtime:
    build: ./server
    # Intentionally NOT mapped to the host: only api-gateway / ai-runtime
    # reach it on the compose network.
    expose:
      - "3001"
    volumes:
      - ./server/data:/app/data
    environment:
      - HEYSURE_SERVICE_ROLE=mcp
      - DATABASE_URL=postgresql+psycopg://heysure:heysure@db:5432/heysure
      - HEYSURE_INTERNAL_TOKEN=${HEYSURE_INTERNAL_TOKEN:-heysure-dev-internal-token-change-me}
      - HEYSURE_API_GATEWAY_URL=http://api-gateway:3000
      - HEYSURE_DB_AUTO_MIGRATE=0
    command: ["python", "-m", "mcp_runtime.main"]
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  connector-runtime:
    build: ./server
    # Exposed to host because external desktop agents / browser plugins
    # connect here over Socket.IO. The /internal/* HTTP routes share the
    # same port but require INTERNAL_TOKEN.
    ports:
      - "3002:3002"
    volumes:
      - ./server/data:/app/data
    environment:
      - HEYSURE_SERVICE_ROLE=connector
      - DATABASE_URL=postgresql+psycopg://heysure:heysure@db:5432/heysure
      - HEYSURE_INTERNAL_TOKEN=${HEYSURE_INTERNAL_TOKEN:-heysure-dev-internal-token-change-me}
      - HEYSURE_API_GATEWAY_URL=http://api-gateway:3000
      - HEYSURE_DB_AUTO_MIGRATE=0
    command: ["python", "-m", "connector_runtime.main"]
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "58150:58150"
    environment:
      - SERVER_URL=http://api-gateway:3000
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  pgdata:
