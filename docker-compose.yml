services:
  server:
    build: ./server
    ports:
      - "3000:3000"
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "58150:58150"
    environment:
      - SERVER_URL=http://server:3000
    depends_on:
      - server
    restart: unless-stopped
