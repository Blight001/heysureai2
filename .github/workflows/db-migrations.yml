name: db-migrations

# Guards the Alembic migration chain (see doc/db-migrations.md):
# - migrations apply forward and roll back cleanly (upgrade -> downgrade -> upgrade)
# - models do not drift from the migrations (`alembic check` => empty diff)
# on PostgreSQL, the only supported runtime database.

on:
  push:
    paths:
      - "server/migrations/**"
      - "server/api/models/**"
      - "server/api/db.py"
      - "server/api/core/settings.py"
      - "server/migrations/env.py"
      - "server/alembic.ini"
      - ".github/workflows/db-migrations.yml"
  pull_request:
    paths:
      - "server/migrations/**"
      - "server/api/models/**"
      - "server/api/db.py"
      - "server/api/core/settings.py"
      - "server/migrations/env.py"
      - "server/alembic.ini"
      - ".github/workflows/db-migrations.yml"

jobs:
  postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: heysure
          POSTGRES_PASSWORD: heysure
          POSTGRES_DB: heysure
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heysure"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ALEMBIC_DATABASE_URL: postgresql+psycopg://heysure:heysure@localhost:5432/heysure
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install migration deps
        run: pip install "sqlmodel" "alembic>=1.13" "pydantic-settings" "psycopg[binary]>=3.2.0"
      - name: Forward / backward / forward
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Drift check (models == migrations)
        run: alembic check
