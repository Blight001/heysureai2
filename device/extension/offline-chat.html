<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeySure 本地对话</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#111827; --panel:#182235; --panel2:#202c43; --border:rgba(255,255,255,.10);
      --text:#edf2ff; --muted:#93a4bd; --accent:#38bdf8; --success:#22c55e; --error:#ef4444;
      --user:#2563eb; --ai:#263348; --font:'Segoe UI',system-ui,sans-serif; --r:8px;
    }
    html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px; }
    #app { height:100vh; display:grid; grid-template-rows:auto 1fr auto; }
    header { height:52px; display:flex; align-items:center; gap:10px; padding:0 16px; background:var(--panel); border-bottom:1px solid var(--border); }
    .title { font-size:15px; font-weight:700; }
    .meta { color:var(--muted); font-size:11px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:420px; }
    .spacer { flex:1; }
    .btn { border:1px solid var(--border); border-radius:var(--r); background:var(--panel2); color:var(--text); height:32px; padding:0 12px; font:600 12px var(--font); cursor:pointer; }
    .btn:hover { border-color:rgba(56,189,248,.45); }
    .btn.primary { border:0; background:linear-gradient(135deg,#2563eb,#0891b2); color:white; }
    .btn.stop { border:0; background:linear-gradient(135deg,#dc2626,#f97316); color:white; }
    .btn.danger { color:#fca5a5; background:rgba(239,68,68,.10); }
    .btn:disabled { opacity:.55; cursor:not-allowed; }
    main { min-height:0; display:flex; flex-direction:column; }
    #messages { flex:1; min-height:0; overflow:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
    #messages::-webkit-scrollbar, textarea::-webkit-scrollbar { width:6px; }
    #messages::-webkit-scrollbar-thumb, textarea::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
    .msg { flex:0 0 auto; max-width:min(92%, 780px); padding:10px 12px; border:1px solid var(--border); border-radius:var(--r); white-space:pre-wrap; word-break:break-word; line-height:1.55; }
    .msg.user { align-self:flex-end; background:var(--user); border-color:rgba(255,255,255,.14); }
    .msg.assistant { align-self:flex-start; background:var(--ai); }
    .msg.system { align-self:center; max-width:90%; color:var(--muted); background:transparent; border-style:dashed; font-size:12px; text-align:center; }
    details.segment { flex:0 0 auto; width:min(92%, 780px); max-width:92%; align-self:flex-start; border:1px solid var(--border); border-radius:var(--r); background:var(--panel2); overflow:hidden; }
    details.segment summary { min-height:34px; cursor:pointer; list-style:none; padding:8px 10px; display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px; font-weight:700; }
    details.segment summary::-webkit-details-marker { display:none; }
    .segment-body { min-height:48px; max-height:320px; overflow:auto; padding:10px; border-top:1px solid var(--border); background:#0b1220; color:#d9e6f7; white-space:pre-wrap; word-break:break-word; overflow-wrap:anywhere; font:11px/1.5 'Cascadia Code',Consolas,monospace; }
    .tool-images { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); white-space:normal; }
    .tool-image { min-width:0; border:1px solid var(--border); border-radius:var(--r); background:#111827; overflow:hidden; }
    .tool-image img { display:block; width:100%; max-height:260px; object-fit:contain; background:#020617; }
    .tool-image figcaption { padding:6px 8px; color:var(--muted); font:11px var(--font); }
    .seg-status { margin-left:auto; color:var(--success); }
    .seg-status.fail { color:#fca5a5; }
    #token-stats { padding:8px 16px 10px; border-top:1px solid var(--border); color:var(--muted); font-size:11px; }
    footer { border-top:1px solid var(--border); background:var(--panel); padding:16px 16px 18px; display:grid; gap:10px; }
    .composer { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:end; }
    textarea, input[type=text], input[type=url], select { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--r); background:var(--bg); color:var(--text); outline:none; font:13px var(--font); line-height:1.5; }
    textarea { min-height:56px; max-height:180px; resize:vertical; }
    textarea:focus, input:focus, select:focus { border-color:var(--accent); }
    label { display:block; margin-bottom:4px; color:var(--muted); font-size:11px; font-weight:700; }
    .field { margin-bottom:10px; }
    .bar { display:flex; align-items:center; gap:8px; }
    #prompt-panel, #tool-panel, #model-panel { display:none; padding:12px; background:var(--panel2); border-top:1px solid var(--border); }
    #prompt-panel.open, #tool-panel.open, #model-panel.open { display:block; }
    #prompt-input { min-height:110px; }
    .hint { color:var(--muted); font-size:11px; }
    #tool-panel { max-height:300px; overflow:auto; }
    .tool-actions { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
    #tool-search { flex:1; height:32px; padding:0 10px; border:1px solid var(--border); border-radius:var(--r); background:var(--bg); color:var(--text); outline:none; }
    .tool-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:6px; }
    .tool-item { display:flex; align-items:center; gap:7px; min-width:0; padding:6px 8px; border:1px solid var(--border); border-radius:var(--r); background:rgba(255,255,255,.03); color:var(--muted); font:11px 'Cascadia Code',Consolas,monospace; }
    .tool-item span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="title">本地对话</div>
      <div class="meta" id="model-meta">加载中...</div>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="model-btn">模型</button>
    <button class="btn" id="prompt-btn">Prompt</button>
    <button class="btn" id="tools-btn">MCP 范围</button>
    <button class="btn danger" id="recall-btn">撤回</button>
  </header>
  <main>
    <div id="model-panel">
      <div class="field"><label>服务商预设</label>
        <select id="cfg-ai-provider">
          <option value="">自定义 / 不修改</option>
          <option value="anthropic">Anthropic Claude</option>
          <option value="openai">OpenAI</option>
          <option value="deepseek">DeepSeek</option>
          <option value="openrouter">OpenRouter</option>
          <option value="ollama">本地 Ollama</option>
        </select>
      </div>
      <div class="field"><label>AI Key</label><input type="text" id="cfg-ai-key" placeholder="sk-ant-... 或 sk-..."/></div>
      <div class="field"><label>Base URL</label><input type="url" id="cfg-ai-base" placeholder="https://api.anthropic.com"/></div>
      <div class="field"><label>模型</label><input type="text" id="cfg-ai-model" placeholder="claude-sonnet-4-5"/></div>
      <div class="bar">
        <button class="btn primary" id="model-save">保存模型配置</button>
        <span class="hint" id="model-feedback"></span>
      </div>
    </div>
    <div id="prompt-panel">
      <textarea id="prompt-input" placeholder="设置本次本地对话的 system prompt"></textarea>
      <div class="bar" style="margin-top:8px;">
        <button class="btn primary" id="prompt-save">保存 Prompt</button>
        <span class="hint" id="prompt-feedback"></span>
      </div>
    </div>
    <div id="tool-panel">
      <div class="tool-actions">
        <input id="tool-search" type="text" placeholder="筛选 MCP 工具" />
        <button class="btn" id="tools-all">全选</button>
        <button class="btn" id="tools-none">全不选</button>
      </div>
      <div class="hint" id="tool-count" style="margin-bottom:8px;"></div>
      <div class="tool-list" id="tool-list"></div>
    </div>
    <div id="messages"></div>
    <div id="token-stats">本次会话累计 Token：输入 0 / 输出 0 / 总计 0</div>
  </main>
  <footer>
    <div class="composer">
      <textarea id="input" placeholder="输入一次性对话内容，Enter 发送，Shift+Enter 换行"></textarea>
      <button class="btn primary" id="send-btn">发送</button>
    </div>
  </footer>
</div>
<script src="dist/offline-chat.js"></script>
</body>
</html>
