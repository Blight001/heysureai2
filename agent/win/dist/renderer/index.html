<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeySure Agent</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0e0e1a;
      --bg2:          #14142a;
      --bg3:          #1a1a35;
      --surface:      rgba(255,255,255,0.04);
      --surface-h:    rgba(255,255,255,0.08);
      --border:       rgba(255,255,255,0.08);
      --text:         #e8e8f8;
      --text-muted:   #7878a8;
      --accent:       #6366f1;
      --accent2:      #8b5cf6;
      --success:      #22c55e;
      --error:        #ef4444;
      --warning:      #f59e0b;
      --info:         #38bdf8;
      --radius-sm:    6px;
      --radius:       10px;
      --radius-lg:    14px;
      --shadow:       0 4px 24px rgba(0,0,0,0.4);
      --transition:   0.2s ease;
      --font:         'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body.light {
      --bg:           #f0f0ff;
      --bg2:          #e8e8fc;
      --bg3:          #e0e0f8;
      --surface:      rgba(255,255,255,0.7);
      --surface-h:    rgba(255,255,255,0.9);
      --border:       rgba(99,102,241,0.15);
      --text:         #1a1a3a;
      --text-muted:   #6060a0;
      --shadow:       0 4px 24px rgba(99,102,241,0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Layout ───────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 54px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    #header > * { -webkit-app-region: no-drag; }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.3px;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .logo-text { color: var(--text); }
    .logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 2px;
    }

    .header-spacer { flex: 1; }

    /* Status pill */
    #status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      transition: all var(--transition);
    }
    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #787878;
      transition: background var(--transition);
      flex-shrink: 0;
    }
    #status-dot.disconnected { background: #787878; }
    #status-dot.connecting   { background: var(--warning); animation: pulse 1.2s infinite; }
    #status-dot.connected    { background: var(--accent); }
    #status-dot.registered   { background: var(--success); animation: pulse-slow 3s infinite; }
    #status-dot.error        { background: var(--error); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* Theme toggle */
    #theme-toggle {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all var(--transition);
    }
    #theme-toggle:hover { background: var(--surface-h); color: var(--text); }

    /* ── Body (columns) ───────────────────────────────────────── */
    #body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left column (tabbed) ─────────────────────────────────── */
    #feed-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 14px 16px 16px 20px;
      gap: 0;
    }

    /* ── Tab nav ──────────────────────────────────────────────── */
    .tab-nav {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .tab-btn {
      padding: 5px 14px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
      letter-spacing: 0.2px;
    }
    .tab-btn:hover { background: var(--surface); color: var(--text); }
    .tab-btn.active { background: rgba(99,102,241,0.15); color: var(--accent); }

    /* ── Activity feed pane ───────────────────────────────────── */
    #feed-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      gap: 8px;
    }
    #feed-pane.hidden { display: none; }

    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .feed-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }
    #clear-btn {
      font-size: 11px;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all var(--transition);
    }
    #clear-btn:hover { color: var(--text); background: var(--surface); }

    #feed {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }
    #feed::-webkit-scrollbar { width: 4px; }
    #feed::-webkit-scrollbar-track { background: transparent; }
    #feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Activity entry cards ─────────────────────────────────── */
    .entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      animation: slide-in 0.2s ease;
      transition: border-color var(--transition);
    }
    .entry:hover { border-color: rgba(99,102,241,0.3); }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .entry-icon.info     { background: rgba(56,189,248,0.15); }
    .entry-icon.warn     { background: rgba(245,158,11,0.15); }
    .entry-icon.error    { background: rgba(239,68,68,0.15); }
    .entry-icon.success  { background: rgba(34,197,94,0.15); }
    .entry-icon.running  { background: rgba(99,102,241,0.15); }
    .entry-icon.system   { background: rgba(139,92,246,0.15); }

    .entry-body { flex: 1; min-width: 0; }

    .entry-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }
    .entry-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .entry-type.task   { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .entry-type.system { background: rgba(139,92,246,0.2); color: #c4b5fd; }
    .entry-type.info   { background: rgba(56,189,248,0.2); color: #7dd3fc; }
    .entry-type.warn   { background: rgba(245,158,11,0.2); color: #fcd34d; }
    .entry-type.error  { background: rgba(239,68,68,0.2); color: #fca5a5; }

    .entry-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-left: auto;
      white-space: nowrap;
    }

    .entry-message {
      font-size: 13px;
      color: var(--text);
      word-break: break-word;
    }

    .entry-data-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 5px;
      padding: 2px 6px;
      border-radius: 4px;
      border: none;
      background: none;
      transition: all var(--transition);
    }
    .entry-data-toggle:hover { color: var(--accent); background: rgba(99,102,241,0.1); }
    .entry-data-toggle .arrow { transition: transform 0.15s; display: inline-block; }
    .entry-data-toggle.open .arrow { transform: rotate(90deg); }

    .entry-data {
      display: none;
      margin-top: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
      overflow: auto;
      max-height: 200px;
    }
    .entry-data.visible { display: block; }
    .entry-data pre {
      font-family: 'Cascadia Code', 'Consolas', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .entry-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      margin-top: 4px;
    }
    .entry-status-badge.success { background: rgba(34,197,94,0.15); color: #4ade80; }
    .entry-status-badge.error   { background: rgba(239,68,68,0.15); color: #f87171; }
    .entry-status-badge.running { background: rgba(99,102,241,0.15); color: #818cf8; }

    #feed-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex: 1;
      color: var(--text-muted);
      user-select: none;
    }
    #feed-empty .empty-icon { font-size: 40px; opacity: 0.3; }
    #feed-empty p { font-size: 13px; }

    /* ── Chat pane ────────────────────────────────────────────── */
    #chat-pane {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    #chat-pane.active { display: flex; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 4px 4px 4px 0;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-no-key {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      color: var(--text-muted);
      user-select: none;
    }
    .chat-no-key-icon { font-size: 38px; opacity: 0.3; }

    .chat-msg {
      display: flex;
      gap: 10px;
      animation: slide-in 0.2s ease;
    }
    .chat-msg.user {
      flex-direction: row-reverse;
      align-self: flex-end;
      max-width: 88%;
    }
    .chat-msg.ai {
      align-self: flex-start;
      max-width: 94%;
    }

    .chat-avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .chat-msg.ai .chat-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .chat-msg.user .chat-avatar {
      background: rgba(99,102,241,0.2);
      color: var(--accent);
    }

    .chat-bubble {
      padding: 10px 13px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.65;
      word-break: break-word;
    }
    .chat-msg.ai .chat-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }
    .chat-msg.user .chat-bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border-top-right-radius: 4px;
    }
    .chat-bubble code {
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 11px;
      background: var(--bg3);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .chat-bubble pre {
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 11px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      margin-top: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .chat-thinking {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }
    .chat-thinking-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: thinking 1.4s infinite;
    }
    .chat-thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .chat-thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinking {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 10px 0 0 0;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }
    .chat-input {
      flex: 1;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      resize: none;
      transition: border-color var(--transition);
      line-height: 1.5;
      max-height: 110px;
      min-height: 40px;
      overflow-y: auto;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-input::placeholder { color: var(--text-muted); }

    .chat-send-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
      align-self: flex-end;
    }
    .chat-send-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Right sidebar ────────────────────────────────────────── */
    #sidebar {
      width: 295px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px 20px 16px 0;
      overflow-y: auto;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Info rows */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-muted); }
    .info-value {
      color: var(--text);
      font-weight: 500;
      text-align: right;
      max-width: 155px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .info-value.connected    { color: var(--success); }
    .info-value.registered   { color: var(--success); }
    .info-value.connecting   { color: var(--warning); }
    .info-value.error        { color: var(--error); }
    .info-value.disconnected { color: var(--text-muted); }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-box {
      background: var(--bg3);
      border-radius: var(--radius);
      padding: 10px;
      text-align: center;
    }
    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }
    .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* Form */
    .form-group { margin-bottom: 10px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      width: 100%;
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      outline: none;
      transition: border-color var(--transition);
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-muted); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      width: 100%;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.25);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--surface-h); }

    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    .save-feedback {
      font-size: 11px;
      color: var(--success);
      text-align: center;
      min-height: 16px;
      margin-top: 4px;
    }
    .divider { height: 1px; background: var(--border); margin: 8px 0; }

    /* Test connection result */
    .test-result {
      font-size: 11px;
      padding: 5px 8px;
      border-radius: var(--radius-sm);
      margin-top: 6px;
      min-height: 22px;
      transition: all var(--transition);
    }
    .test-result.success { background: rgba(34,197,94,0.1); color: var(--success); }
    .test-result.error   { background: rgba(239,68,68,0.1); color: var(--error); }
  </style>
</head>
<body class="dark">
<div id="app">

  <!-- ── Header ── -->
  <header id="header">
    <div class="logo">
      <div class="logo-icon">&#x26A1;</div>
      <span class="logo-text">HeySure Agent</span>
      <span class="logo-sub">Windows</span>
    </div>

    <div class="header-spacer"></div>

    <div id="status-pill">
      <div id="status-dot" class="disconnected"></div>
      <span id="status-label">未连接</span>
    </div>

    <button id="theme-toggle" title="切换主题">&#x1F319;</button>
  </header>

  <!-- ── Body ── -->
  <div id="body">

    <!-- Left: tabbed column -->
    <div id="feed-col">

      <!-- Tab nav -->
      <div class="tab-nav">
        <button class="tab-btn active" id="tab-feed">&#x25A0; 活动流</button>
        <button class="tab-btn" id="tab-chat">&#x1F4AC; AI 对话</button>
      </div>

      <!-- Activity feed pane -->
      <div id="feed-pane">
        <div class="feed-header">
          <span class="feed-title">实时活动</span>
          <button id="clear-btn">清空</button>
        </div>
        <div id="feed">
          <div id="feed-empty">
            <div class="empty-icon">&#x1F916;</div>
            <p>等待任务中...</p>
            <p style="font-size:11px">Agent 连接后将在此显示实时活动</p>
          </div>
        </div>
      </div>

      <!-- Chat pane -->
      <div id="chat-pane">
        <div class="chat-messages" id="chat-messages">
          <div id="chat-no-key" class="chat-no-key">
            <div class="chat-no-key-icon">&#x1F511;</div>
            <p>请在设置中配置 AI Key</p>
            <p style="font-size:11px">支持 Anthropic Claude 和 OpenAI 兼容接口</p>
          </div>
        </div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chat-input" placeholder="向 AI 发送消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
          <button class="chat-send-btn" id="chat-send" title="发送 (Enter)">&#x2191;</button>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar">

      <!-- Agent Status Card -->
      <div class="card">
        <div class="card-title">&#x1F4E1; Agent 状态</div>
        <div class="info-row">
          <span class="info-label">连接状态</span>
          <span class="info-value disconnected" id="info-status">未连接</span>
        </div>
        <div class="info-row">
          <span class="info-label">Agent 名称</span>
          <span class="info-value" id="info-name">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">服务器</span>
          <span class="info-value" id="info-server">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">工作区</span>
          <span class="info-value" id="info-workspace">—</span>
        </div>
      </div>

      <!-- Stats Card -->
      <div class="card">
        <div class="card-title">&#x1F4CA; 统计</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-num" id="stat-tasks">0</div>
            <div class="stat-label">总任务</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="stat-success" style="color:var(--success)">0</div>
            <div class="stat-label">成功</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="stat-failed" style="color:var(--error)">0</div>
            <div class="stat-label">失败</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="stat-running" style="color:var(--warning)">0</div>
            <div class="stat-label">运行中</div>
          </div>
        </div>
      </div>

      <!-- AI Settings Card -->
      <div class="card">
        <div class="card-title">&#x1F916; AI 配置</div>
        <div class="form-group">
          <label class="form-label" for="cfg-ai-key">AI Key</label>
          <input class="form-input" id="cfg-ai-key" type="password" placeholder="sk-ant-... 或 sk-..." />
        </div>
        <div class="form-group">
          <label class="form-label" for="cfg-ai-base-url">Base URL</label>
          <input class="form-input" id="cfg-ai-base-url" type="text" placeholder="https://api.anthropic.com" />
        </div>
        <div class="form-group">
          <label class="form-label" for="cfg-ai-model">模型</label>
          <input class="form-input" id="cfg-ai-model" type="text" placeholder="claude-sonnet-4-5" />
        </div>
      </div>

      <!-- Connection Settings Card -->
      <div class="card">
        <div class="card-title">&#x2699;&#xFE0F; 连接设置</div>

        <div class="form-group">
          <label class="form-label" for="cfg-server">服务器 URL</label>
          <input class="form-input" id="cfg-server" type="text" placeholder="http://localhost:3000" />
        </div>
        <div class="form-group">
          <label class="form-label" for="cfg-token">Agent Token</label>
          <input class="form-input" id="cfg-token" type="password" placeholder="留空则不验证" />
        </div>
        <div class="form-group">
          <label class="form-label" for="cfg-name">Agent 名称</label>
          <input class="form-input" id="cfg-name" type="text" placeholder="Windows Agent" />
        </div>
        <div class="form-group">
          <label class="form-label" for="cfg-id">Agent ID</label>
          <input class="form-input" id="cfg-id" type="text" placeholder="自动生成" />
        </div>
        <div class="form-group">
          <label class="form-label" for="cfg-group">分组</label>
          <input class="form-input" id="cfg-group" type="text" placeholder="可选" />
        </div>
        <div class="form-group">
          <label class="form-label" for="cfg-workspace">工作区目录</label>
          <input class="form-input" id="cfg-workspace" type="text" placeholder="C:\Users\...\Documents\Workspace" />
        </div>

        <div style="margin-top:12px">
          <button class="btn btn-secondary" id="save-btn">保存所有设置</button>
          <div class="save-feedback" id="save-feedback"></div>
        </div>

        <div class="divider"></div>

        <button class="btn btn-secondary" id="test-conn-btn">&#x1F50C; 测试服务器连接</button>
        <div class="test-result" id="test-result"></div>

        <div class="divider"></div>

        <div class="btn-row">
          <button class="btn btn-primary" id="connect-btn">连接</button>
          <button class="btn btn-danger" id="disconnect-btn">断开</button>
        </div>
      </div>

    </aside>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
